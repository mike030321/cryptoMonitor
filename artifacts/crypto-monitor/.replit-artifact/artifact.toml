kind = "web"
previewPath = "/"
title = "Crypto AI Monitor"
version = "1.0.0"
id = "artifacts/crypto-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21714

[services.development]
run = "pnpm --filter @workspace/crypto-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-monitor", "run", "build" ]
publicDir = "artifacts/crypto-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21714"
BASE_PATH = "/"
